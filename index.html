<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메이플랜드 파밍 계산기</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="container">
    <h1>🍁 파밍 계산기</h1>

    <div class="auth-bar">
      <div id="google-signin-btn"></div>
      <div id="auth-info" class="auth-info hidden">
        <span id="auth-name" class="auth-name"></span>
        <button id="btn-signout" class="small-btn">로그아웃</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="items">아이템</button>
      <button class="tab-btn" data-tab="timer">타이머</button>
      <button class="tab-btn" data-tab="history">기록</button>
    </div>

    <!-- 아이템 탭 -->
    <div id="panel-items" class="panel">
      <div class="links-section">
        <div class="links-header">
          <span class="links-title">🔗 링크</span>
          <button id="btn-add-link" class="small-btn owner-only">+ 추가</button>
        </div>
        <div id="links-list" class="links-list"></div>
        <div id="link-form" class="link-form hidden">
          <input id="link-name" type="text" placeholder="이름 (예: 까막산 입구)" />
          <input id="link-url" type="text" placeholder="URL (예: https://...)" />
          <div class="link-form-btns">
            <button id="link-cancel" class="small-btn">취소</button>
            <button id="link-save" class="small-btn primary">저장</button>
          </div>
        </div>
      </div>

      <div class="quick-timer">
        <span id="qt-clock">00:00:00</span>
        <div class="qt-btns">
          <button id="qt-start">▶ 시작</button>
          <button id="qt-pause" disabled>⏸</button>
          <button id="qt-reset">↺</button>
        </div>
      </div>

      <div id="items-grid" class="items-grid"></div>
      <button id="btn-add-item" class="full-btn owner-only">+ 아이템 추가</button>

      <div class="summary">
        <p class="label">전체 사냥 추정</p>
        <p id="total-kills" class="big-number">0 마리</p>
        <p class="hint">아이템 중 가장 많이 필요한 마릿수 기준</p>
      </div>
    </div>

    <!-- 타이머 탭 -->
    <div id="panel-timer" class="panel hidden">
      <div class="row">
        <div>
          <label>시작 경험치</label>
          <input id="exp-start" type="number" value="0" min="0" />
        </div>
        <div>
          <label>현재 경험치</label>
          <input id="exp-end" type="number" value="0" min="0" />
        </div>
      </div>

      <div>
        <label>사냥터 (선택)</label>
        <input id="location-name" type="text" placeholder="예: 와일드카고" />
      </div>

      <div class="timer-display">
        <p class="label" id="timer-status">경과 시간</p>
        <p id="timer-clock">00:00:00</p>
      </div>

      <div id="live-stats" class="hidden">
        <div class="row">
          <div class="live-card">
            <p class="label">시간당 경험치</p>
            <p id="live-exp">0</p>
          </div>
          <div class="live-card">
            <p class="label">획득 아이템</p>
            <p id="live-items">0개</p>
          </div>
        </div>
      </div>

      <div class="button-row">
        <button id="btn-start">▶ 시작</button>
        <button id="btn-pause" disabled>⏸ 일시정지</button>
        <button id="btn-stop" disabled>⏹ 종료</button>
        <button id="btn-reset">↻ 리셋</button>
      </div>

      <div id="save-prompt" class="save-prompt hidden">
        <p id="save-summary"></p>
        <button id="btn-save" class="owner-only">💾 기록 저장</button>
      </div>
    </div>

    <!-- 기록 탭 -->
    <div id="panel-history" class="panel hidden">
      <div class="row-between">
        <p>저장된 파밍 기록</p>
        <button id="btn-clear-all" class="small-btn owner-only">전체 삭제</button>
      </div>
      <div id="history-list"></div>
      <p id="history-empty" class="empty">아직 저장된 기록이 없어요</p>
    </div>
  </div>

  <!-- 편집 모달 -->
  <div id="edit-modal" class="modal hidden">
    <div class="modal-box">
      <h3>아이템 설정</h3>
      <label>이름</label>
      <input id="m-name" type="text" />
      <label>아이템 이미지 (선택)</label>
      <div id="image-drop-zone" class="image-drop-zone">
        <div id="image-preview-wrap">
          <img id="image-preview" alt="" />
          <button type="button" id="image-remove" title="이미지 제거">×</button>
        </div>
        <div id="image-empty">
          <p class="drop-main">📋 여기에 붙여넣기 (Ctrl+V)</p>
          <p class="drop-sub">또는 이미지를 끌어다 놓기</p>
          <button type="button" id="image-pick">파일 선택</button>
          <input type="file" id="image-file" accept="image/*" style="display:none" />
        </div>
      </div>
      <label>드랍 확률 (%)</label>
      <input id="m-rate" type="number" step="0.01" min="0.0001" />
      <label>현재 개수</label>
      <input id="m-count" type="number" min="0" />
      <div class="modal-buttons">
        <button id="m-delete" class="danger">🗑 삭제</button>
        <div style="flex:1"></div>
        <button id="m-cancel">취소</button>
        <button id="m-save" class="primary">저장</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
